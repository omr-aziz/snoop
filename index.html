<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <title>Do you love me?</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      html {
        overflow: hidden;
        height: 100%;
        width: 100%;
      }
      body {
        display: grid;
        justify-content: center;
        align-items: center;
        background-color: #ffe6e9;
        font-family: "Quicksand", sans-serif;
        height: 100%;
        width: 100%;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
      }
      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        transition: 0.2s;
      }

      .question-container {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        transition: 0.2s;
        width: 90vw;
        max-width: 400px;
      }
      .tenor-gif-embed {
        height: 15rem;
        pointer-events: none;
        border-radius: 10px;
        margin-bottom: 3rem;
        overflow: hidden;
      }
      .question {
        font-size: clamp(1.6rem, 6vw, 2.8rem);
        margin-bottom: 1rem;
        color: #d63e5a;
        white-space: nowrap;
      }
      .button-container {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        position: relative;
        height: 200px;
        width: 100%;
        max-width: 320px;
        margin: 1.5rem auto 0;
        border-radius: 12px;
      }
      .btn {
        position: absolute;
        border: none;
        border-radius: 50px;
        padding: 10px 20px;
        font-family: "Poppins", sans-serif;
        font-size: 18px;
        cursor: pointer;
        transition: all 0.3s ease;
        background-color: #ff6b81;
        color: white;
        transform: scale(1.05);
        box-shadow: 0px 4px 15px rgba(255, 107, 129, 0.5);
      }
      .btn:hover {
        background-color: #ffa4b1;
        transform: scale(1.1);
        box-shadow: 0px 6px 20px rgba(255, 107, 129, 0.7);
        text-shadow: 1px 1px 5px rgba(255, 182, 193, 0.8);
      }

      .yes-btn {
        right: 54%;
      }
      .no-btn {
        left: 54%;
        transition: left 0.15s ease, top 0.15s ease;
      }

      .result-container {
        width: 100%;
        display: none;
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        transition: 0.2s;
      }
      .gif-result {
        border-radius: 10px;
        margin-bottom: 2rem;
        width: 300px;
      }
      .result-container h2 {
        font-size: 1.4rem;
        text-align: center;
        color: #d63e5a;
      }

      /* cake loader */
      .cssload-main {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        z-index: 999;
        background-color: #ffe6e9;
        width: 100vw;
        height: 100vh;
        justify-content: center;
      }

      .cake-emoji {
        font-size: 90px;
        display: block;
        animation: cakeSpin 2.4s cubic-bezier(0.75, 0, 0.5, 1) infinite,
                   cakeBounce 0.7s ease-in-out infinite alternate;
        transform-origin: center;
      }

      .cake-label {
        font-family: "Quicksand", sans-serif;
        font-size: 1.8rem;
        font-weight: 700;
        color: #d63e5a;
        letter-spacing: 2px;
        margin-top: 0.6rem;
        text-shadow: 1px 1px 8px rgba(255, 107, 129, 0.5);
        animation: pulseFade 1s ease-in-out infinite alternate;
      }

      .cssload-shadow {
        width: 60px;
        height: 12px;
        background-color: rgb(215, 215, 215);
        border: 1px solid rgb(215, 215, 215);
        border-radius: 50%;
        margin: 8px auto 0;
        animation: cssload-shadow 0.7s ease-in-out infinite alternate;
      }

      @keyframes cakeSpin {
        0%   { transform: rotate(0deg); }
        50%  { transform: rotate(360deg); }
        100% { transform: rotate(720deg); }
      }
      @keyframes cakeBounce {
        from { margin-bottom: 0px; }
        to   { margin-bottom: 14px; }
      }
      @keyframes pulseFade {
        from { opacity: 0.65; transform: scale(0.97); }
        to   { opacity: 1;    transform: scale(1.03); }
      }
      @keyframes cssload-shadow {
        from { transform: scale(1);   opacity: 0.6; }
        to   { transform: scale(0.5); opacity: 0.2; }
      }

      /* trap page */
      .trap-container {
        width: 100vw;
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        z-index: 100;
      }
      .trap-emoji {
        font-size: 100px;
        animation: wobble 0.8s ease-in-out infinite alternate;
      }
      .trap-text {
        font-size: 1.5rem;
        font-weight: 700;
        color: #d63e5a;
        line-height: 1.5;
      }
      .trap-yes-btn {
        border: none;
        border-radius: 50px;
        padding: 12px 36px;
        font-family: "Poppins", sans-serif;
        font-size: 20px;
        cursor: pointer;
        background-color: #ff6b81;
        color: white;
        box-shadow: 0px 4px 15px rgba(255, 107, 129, 0.5);
        transition: all 0.3s ease;
        margin-top: 0.5rem;
      }
      .trap-yes-btn:hover {
        background-color: #ffa4b1;
        transform: scale(1.1);
      }
      @keyframes wobble {
        from { transform: rotate(-10deg) scale(1);   }
        to   { transform: rotate( 10deg) scale(1.15); }
      }
    </style>
  </head>
  <body>
    <div class="question-container container">
      <div class="tenor-gif-embed" data-postid="11975191960342404712" data-share-method="host" data-aspect-ratio="1.10667" data-width="100%">
        <a href="https://tenor.com/view/peach-goma-peach-and-goma-peach-peach-cat-sparkle-gif-11975191960342404712">Peach Goma Peach And Goma GIF</a>
        from <a href="https://tenor.com/search/peach+goma-gifs">Peach Goma GIFs</a>
      </div>
      <script type="text/javascript" async src="https://tenor.com/embed.js"></script>

      <h2 class="question">النهاردة شكون🤔؟</h2>
      <div class="button-container">
        <button class="yes-btn btn js-yes-btn">نعرف😭ـ</button>
        <button class="no-btn btn js-no-btn">مانعرفش😡ـ</button>
      </div>
    </div>

    <div class="result-container container">
      <video class="gif-result" src="cute love gif.mp4" autoplay loop muted playsinline></video>
      <h2>❤️أنتِ التي تشرق الشمس لأجلك❤️</h2>
    </div>

    <div class="cssload-main">
      <span class="cake-emoji">🎂</span>
      <div class="cake-label">Happy Pizza Sousou 🍕🎉</div>
      <div class="cssload-shadow"></div>
    </div>

    <div class="trap-container" id="trapPage">
      <div class="tenor-gif-embed" data-postid="482557620391773062" data-share-method="host" data-aspect-ratio="1" data-width="100%">
        <a href="https://tenor.com/view/bubu-angry-bubu-fierce-bubu-gif-482557620391773062">Bubu Angry Bubu Fierce Sticker</a>
        from <a href="https://tenor.com/search/bubu+angry-stickers">Bubu Angry Stickers</a>
      </div>
      <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
      <p class="trap-text">طب ماشي.. بس انتي عارفة إن <br>مفيش فايدة إنك تقوليلي لا 😡ـ</p>
      <button class="trap-yes-btn js-trap-yes-btn">باهي 😭ـ</button>
    </div>

    <script>
      const questionContainer = document.querySelector(".question-container");
      const resultContainer   = document.querySelector(".result-container");
      const gifResult         = document.querySelector(".gif-result");
      const heartLoader       = document.querySelector(".cssload-main");
      const yesBtn            = document.querySelector(".js-yes-btn");
      const noBtn             = document.querySelector(".js-no-btn");

      let moveCount = 0;
      const MAX_MOVES = 15;
      let originalX = null;
      let originalY = null;

      function moveNoBtn() {
        if (moveCount >= MAX_MOVES) return;
        moveCount++;

        if (originalX === null) {
          const rect = noBtn.getBoundingClientRect();
          originalX = rect.left;
          originalY = rect.top;
        }

        const btnW  = noBtn.offsetWidth;
        const btnH  = noBtn.offsetHeight;
        const RANGE = 100;
        const pad   = 10;

        let newX = originalX + (Math.random() * RANGE * 2 - RANGE);
        let newY = originalY + (Math.random() * RANGE * 2 - RANGE);

        // ضمان إن الزرار ميطلعش برا الشاشة على الموبايل
        newX = Math.max(pad, Math.min(newX, window.innerWidth  - btnW - pad));
        newY = Math.max(pad, Math.min(newY, window.innerHeight - btnH - pad));

        noBtn.style.position = "fixed";
        noBtn.style.left     = `${newX}px`;
        noBtn.style.top      = `${newY}px`;
        noBtn.style.right    = "auto";
      }

      // كمبيوتر: hover يحرك الزرار
      noBtn.addEventListener("mouseover", moveNoBtn);

      // موبايل: touchstart يحرك الزرار
      noBtn.addEventListener("touchstart", (e) => {
        if (moveCount < MAX_MOVES) {
          e.preventDefault(); // يمنع الكليك بس لو لسه في حركات
          moveNoBtn();
        }
        // لو خلصت الـ 15، خليه يكمل عادي للـ click
      }, { passive: false });

      // لو حد نجح يدوس فعلاً: يفتح التراب بيج
      noBtn.addEventListener("click", () => {
        questionContainer.style.display = "none";
        noBtn.style.display = "none";
        document.getElementById("trapPage").style.display = "flex";
      });

      // زرار التراب بيج
      const trapYesBtn = document.querySelector(".js-trap-yes-btn");
      trapYesBtn.addEventListener("click", () => {
        document.getElementById("trapPage").style.display = "none";
        heartLoader.style.display = "flex";
        setTimeout(() => {
          heartLoader.style.display = "none";
          resultContainer.style.display = "inherit";
          if (gifResult) gifResult.play();
        }, 3000);
      });

      // زرار Yes الأصلي
      yesBtn.addEventListener("click", () => {
        questionContainer.style.display = "none";
        heartLoader.style.display = "flex";
        setTimeout(() => {
          heartLoader.style.display = "none";
          resultContainer.style.display = "inherit";
          if (gifResult) gifResult.play();
        }, 3000);
      });
    </script>
  </body>
</html>
